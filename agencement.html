<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agencement E703</title>
<style>
/* === Variables de thème === */
:root {
  --bg:#f5f5f0;--bg2:#ffffff;--bg3:#f0ede8;--border:#d8d4cc;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --accent:#5b7fa6;--accent-h:#4a6d91;
  --sb-bg:#2d3748;--sb-text:#e2e8f0;--sb-active:#5b7fa6;--sb-hover:#3d4f6b;
  --prio-ind:#e53e3e;--prio-sou:#d69e2e;--prio-bon:#718096;
  --shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 4px 12px rgba(0,0,0,.15);
}
[data-theme="dark"]{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#1e2a45;--border:#2d3748;
  --text:#e2e8f0;--text2:#a0aec0;--text3:#718096;
  --accent:#63b3ed;--accent-h:#4299e1;
  --sb-bg:#0d1117;--sb-text:#c9d1d9;--sb-active:#1f6feb;--sb-hover:#161b22;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* Layout */
#app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:240px 1fr;height:100vh}
#topbar{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:var(--shadow);z-index:100;flex-wrap:nowrap}
#sidebar{background:var(--sb-bg);color:var(--sb-text);overflow-y:auto;display:flex;flex-direction:column}
#main{overflow-y:auto;padding:24px;background:var(--bg)}

/* Topbar */
#search-input{flex:1;max-width:260px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:13px;min-width:0}
.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-h)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-icon{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 8px;border-radius:6px;cursor:pointer;font-size:16px}.btn-icon:hover{background:var(--bg3)}
#save-ind{font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto;min-width:100px;text-align:right}
#save-ind.saving{color:var(--prio-sou)}#save-ind.saved{color:#48bb78}#save-ind.error{color:var(--prio-ind)}

/* Dropdown */
.dd{position:relative}
.dd-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);min-width:210px;z-index:200;display:none}
.dd-menu.open{display:block}
.dd-menu button{display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text)}
.dd-menu button:hover{background:var(--bg3)}
.dd-menu hr{border:none;border-top:1px solid var(--border);margin:4px 0}

/* Sidebar */
#sb-head{padding:16px;border-bottom:1px solid rgba(255,255,255,.1)}
#sb-head h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
#sb-head p{font-size:11px;opacity:.5;margin-top:2px}
#btn-dash{display:block;width:calc(100% - 16px);margin:8px;padding:8px 12px;background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:6px;color:var(--sb-text);font-size:13px;cursor:pointer;text-align:left}
#btn-dash:hover,#btn-dash.active{background:var(--sb-active);border-color:transparent}
#room-list{flex:1;padding:8px 0}
.ri{padding:8px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.ri:hover{background:var(--sb-hover)}.ri.active{background:rgba(91,127,166,.2);border-left-color:var(--sb-active)}
.ri-name{font-size:13px;font-weight:500}
.ri-info{font-size:11px;opacity:.5;margin-top:2px;display:flex;justify-content:space-between}
.pb{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px}
.pb-fill{height:100%;background:var(--sb-active);border-radius:2px;transition:width .3s}

/* Dashboard */
.section-title{font-size:18px;font-weight:700;margin-bottom:16px}
.dash-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.room-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:box-shadow .15s,transform .15s}
.room-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.room-card h3{font-size:15px;font-weight:600}.room-card .area{font-size:12px;color:var(--text3)}
.room-card .pct{font-size:28px;font-weight:700;color:var(--accent);margin:8px 0 4px}
.room-card .pb{background:var(--border)}
.stats-row{display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--text2)}

/* Room header */
.room-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.room-hdr-info{flex:1}
.room-hdr-info h2{font-size:22px;font-weight:700}
.area-edit{display:inline-flex;align-items:center;gap:6px;margin-top:4px}
.area-edit input{width:80px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);font-size:13px}
.area-edit label{font-size:13px;color:var(--text2)}
.room-pct{font-size:14px;color:var(--text2);margin-top:6px}
.room-pct strong{color:var(--accent);font-size:18px}

/* Accordion */
.acc{border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;background:var(--bg2)}
.acc-hdr{display:flex;align-items:center;padding:12px 16px;cursor:pointer;user-select:none;background:var(--bg2)}
.acc-hdr:hover{background:var(--bg3)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.acc-hdr h3{font-size:14px;font-weight:600;flex:1}
.acc-arrow{font-size:11px;color:var(--text3);transition:transform .2s}
.acc.open .acc-arrow{transform:rotate(180deg)}
.acc-body{padding:16px;display:none;border-top:1px solid var(--border)}
.acc.open .acc-body{display:block}

/* Forms */
textarea,input[type=text],input[type=url],input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-family:inherit;font-size:13px;resize:vertical}
textarea:focus,input:focus{outline:none;border-color:var(--accent)}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg{margin-bottom:14px}

/* Besoins */
.needs-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.need-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.need-item input[type=text]{flex:1;border:none;background:transparent;padding:0;font-size:13px}
.prio-badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:none}
.prio-ind{background:rgba(229,62,62,.15);color:var(--prio-ind)}
.prio-sou{background:rgba(214,158,46,.15);color:var(--prio-sou)}
.prio-bon{background:rgba(113,128,150,.15);color:var(--prio-bon)}
.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.btn-del:hover{color:#e53e3e}
.btn-add{margin-top:6px;font-size:12px;padding:5px 10px;background:var(--bg3);border:1px dashed var(--border);border-radius:6px;cursor:pointer;color:var(--text2)}
.btn-add:hover{background:var(--bg)}

/* Variantes */
.var-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.var-card.chosen{border-color:var(--accent);background:rgba(91,127,166,.06)}
.var-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.var-hdr input[type=text]{flex:1;font-weight:600}
.chosen-lbl{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;flex-shrink:0}
.var-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.var-grid .fg{margin-bottom:0}
.chosen-cb-wrap{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;flex-shrink:0}
.chosen-cb-wrap input{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}

/* Mobilier */
.furn-item{display:grid;grid-template-columns:2fr 130px 2fr auto;gap:8px;align-items:end;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.furn-item .btn-del{margin-bottom:2px}

/* Validation */
.val-list{display:flex;flex-direction:column;gap:8px}
.val-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);cursor:pointer}
.val-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.val-item.chk{background:rgba(72,187,120,.08);border-color:#48bb78}
.val-item label{margin:0;font-size:13px;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;color:var(--text)}

/* Questions */
.q-item{margin-bottom:12px}
.q-item .fl{font-size:13px;text-transform:none;letter-spacing:0;font-weight:600;color:var(--text)}
.q-item textarea{min-height:48px}

/* Images */
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--text3);cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:12px}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(91,127,166,.05)}
.drop-zone p{font-size:13px}.drop-zone .hint{font-size:11px;margin-top:4px}
.url-row{display:flex;gap:8px;margin-bottom:12px}.url-row input{flex:1}
.img-groups{display:flex;flex-direction:column;gap:6px}
.img-group{margin-bottom:10px}
.img-group-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;color:var(--text2)}
.tag-chip-hdr{font-size:12px;padding:2px 10px}
.img-grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.img-card{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg3)}
.img-card img{width:100%;height:100px;object-fit:cover;display:block}
.img-info{padding:6px}
.img-cap{font-size:11px;font-weight:500}
.img-cap-edit{width:100%;font-size:11px;padding:2px 4px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text);margin-top:2px}
.img-tags{font-size:10px;color:var(--text3);margin-top:2px}
.img-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;line-height:1;display:none;align-items:center;justify-content:center}
.img-card:hover .img-del{display:flex}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lb-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:4px}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:28px;padding:10px 16px;cursor:pointer;border-radius:6px}
#lb-prev{left:16px}#lb-next{right:16px}
#lb-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px}
.lb-cap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;text-align:center;background:rgba(0,0,0,.65);padding:8px 16px;border-radius:6px;max-width:600px;width:90%}
.lb-cap p{font-size:13px}.lb-cap a{font-size:11px;color:#63b3ed;word-break:break-all}

/* Bouton d'aide « ? » + modale de suggestions */
.help-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:11px;font-weight:700;cursor:pointer;margin-left:6px;flex-shrink:0;line-height:1;vertical-align:middle}
.help-btn:hover{background:var(--accent-h)}
#help-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:none;align-items:center;justify-content:center;padding:24px}
#help-modal.open{display:flex}
.help-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:20px 24px}
.help-hdr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.help-hdr h3{flex:1;font-size:16px;font-weight:700;color:var(--text)}
.help-intro{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5}
#help-list{list-style:none;display:flex;flex-direction:column;gap:8px}
#help-list li{font-size:13px;line-height:1.5;padding-left:22px;position:relative;color:var(--text)}
#help-list li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:700}

/* Tags éditables des visuels */
.img-tags-edit{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;align-items:center}
.tag-chip{display:inline-flex;align-items:center;gap:2px;background:var(--accent);color:#fff;font-size:10px;padding:1px 4px 1px 6px;border-radius:10px;line-height:1.5}
.tag-x{background:none;border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:12px;line-height:1;padding:0;margin-left:1px}
.tag-x:hover{color:#fff}
.tag-add{width:56px;font-size:10px;padding:1px 5px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text)}

/* Mémo panel */
#memo-panel{position:fixed;top:0;right:-490px;width:470px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);box-shadow:-4px 0 20px rgba(0,0,0,.15);z-index:500;transition:right .3s ease;display:flex;flex-direction:column}
#memo-panel.open{right:0}
.panel-hdr{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--border);gap:8px}
.panel-hdr h3{flex:1;font-size:15px;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:16px}
#memo-search{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:13px;margin-bottom:14px}
.memo-sec{margin-bottom:20px}
.memo-sec h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.memo-tbl{width:100%;border-collapse:collapse;font-size:12px}
.memo-tbl th{background:var(--bg3);padding:5px 8px;text-align:left;font-weight:600;border:1px solid var(--border)}
.memo-tbl td{padding:4px 8px;border:1px solid var(--border)}
.memo-tbl tr:nth-child(even) td{background:var(--bg3)}
.memo-note{font-size:12px;color:var(--text2);line-height:1.6}

/* Utilitaires */
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.row{display:flex;align-items:center;gap:8px}
.text-sm{font-size:12px;color:var(--text3)}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

@media(max-width:640px){
  #app{grid-template-columns:1fr;grid-template-rows:48px 1fr}
  #sidebar{display:none}
}
</style>
</head>
<body>
<div id="app">

<!-- Barre supérieure -->
<div id="topbar">
  <input id="search-input" type="text" placeholder="🔍 Rechercher…" autocomplete="off">
  <button class="btn btn-ghost" id="btn-memo">📐 Mémo</button>
  <div class="dd" id="dd-export">
    <button class="btn btn-ghost" onclick="ddToggle()">Export ▾</button>
    <div class="dd-menu" id="dd-menu">
      <button onclick="exportMdRoom()">📄 Décisions — pièce courante</button>
      <button onclick="exportMdAll()">📄 Décisions — appartement complet</button>
      <hr>
      <button onclick="exportBackup()">💾 Backup complet (.json)</button>
    </div>
  </div>
  <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">Import JSON</button>
  <input type="file" id="import-file" accept=".json" style="display:none">
  <button class="btn-icon" id="btn-theme" title="Basculer thème">🌙</button>
  <span id="save-ind">—</span>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sb-head">
    <h2>Agencement E703</h2>
    <p>T5 · 106,62 m² + terrasse</p>
  </div>
  <button id="btn-dash">📊 Tableau de bord</button>
  <div id="room-list"></div>
</div>

<!-- Contenu principal -->
<div id="main"><div id="mc"></div></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" class="lb-nav" style="position:absolute;top:16px;right:16px;font-size:22px;background:none;border:none;color:#fff;cursor:pointer">✕</button>
  <button id="lb-prev" class="lb-nav">‹</button>
  <img id="lb-img" src="" alt="">
  <button id="lb-next" class="lb-nav">›</button>
  <div class="lb-cap">
    <p id="lb-cap-txt"></p>
    <a id="lb-src-lnk" href="#" target="_blank" rel="noopener" style="display:none"></a>
  </div>
</div>

<!-- Modale d'aide / suggestions -->
<div id="help-modal">
  <div class="help-box">
    <div class="help-hdr">
      <h3 id="help-title"></h3>
      <button class="btn-icon" id="help-close">✕</button>
    </div>
    <p id="help-intro" class="help-intro"></p>
    <ul id="help-list"></ul>
  </div>
</div>

<!-- Mémo ergonomie -->
<div id="memo-panel">
  <div class="panel-hdr">
    <h3>📐 Mémo ergonomie</h3>
    <button class="btn-icon" id="memo-close">✕</button>
  </div>
  <div class="panel-body">
    <input type="text" id="memo-search" placeholder="Filtrer…">
    <div id="memo-content"></div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTES — DONNÉES DE RÉFÉRENCE
// ============================================================

const SEED_ROOMS = [
  {id:'cuisine',   name:'Cuisine',             area:7.5,   order:1},  // zone carrelée mesurée (SketchUp) — intégrée au séjour
  {id:'entree',    name:'Entrée',              area:5.71,  order:2},
  {id:'degagement',name:'Dégagement (DGT)',    area:4.80,  order:3},
  {id:'sejour',    name:'Séjour',              area:22.5,  order:4},  // séjour net = 29,94 plan − 7,5 cuisine
  {id:'chambre1',  name:'Chambre 1',           area:15.01, order:5},
  {id:'chambre4',  name:'Chambre 4',           area:15.09, order:6},
  {id:'chambre2',  name:'Chambre 2',           area:12.02, order:7},
  {id:'chambre3',  name:'Chambre 3',           area:10.67, order:8},
  {id:'sdb',       name:'Salle de bain (SDB)', area:5.37,  order:9},
  {id:'sde',       name:"Salle d'eau (SDE)",   area:5.97,  order:10},
  {id:'wc',        name:'WC',                  area:2.04,  order:11},
  {id:'terrasse',  name:'Terrasse',            area:36.56, order:12},
];

const SEED_QUESTIONS = {
  cuisine:    ['Cuisine ouverte assumée ou semi-fermée ?','Lave-vaisselle ?',"Besoin d'un plan de travail mini (longueur) ?","Coin repas / îlot / bar côté séjour ?"],
  entree:     ["Banc d'assise pour se chausser ?",'Miroir ?','Rangement saisonnier ?','Penderie + chaussures + vide-poche : quels volumes ?'],
  degagement: ['Placard technique / linge ?','Quoi y ranger en priorité ?'],
  sejour:     ['Combien de places à table (courant / max) ?','Distance canapé-TV souhaitée ?','Zone bureau intégrée ou non ?','Bibliothèque murale ?'],
  chambre1:   ['Lit 140 / 160 / 180 ?','Dressing fermé ou penderie ouverte ?','Bureau ?','Tête de lit avec rangements ?'],
  chambre4:   ['Fonction principale (enfant / ami / bureau) ?','Un ou deux couchages ?'],
  chambre2:   ['Lit simple ou double ?',"Besoin d'un bureau ?"],
  chambre3:   ['Usage (chambre / bureau / multifonction) ?','Lit gain de place / escamotable ?'],

let db = null;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('agencement-e703',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('data')) d.createObjectStore('data');
      if(!d.objectStoreNames.contains('images')) d.createObjectStore('images');
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e.target.error);
  });
}
function dbGet(store,key){return new Promise((res,rej)=>{const t=db.transaction(store,'readonly'),r=t.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function dbSet(store,key,val){return new Promise((res,rej)=>{const t=db.transaction(store,'readwrite'),r=t.objectStore(store).put(val,key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbDel(store,key){return new Promise((res,rej)=>{const t=db.transaction(store,'readwrite'),r=t.objectStore(store).delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}

// ============================================================
// CALCUL D'AVANCEMENT (§4.3)
// Moyenne simple sur 6 étapes :
//   1 = ≥1 besoin ; 2 = contraintes non vide ; 3 = zones non vide
//   4 = ≥1 variante ; 5 = ≥1 meuble ; 6 = ratio cases validation cochées
// ============================================================

function calcPct(room){
  if(!room) return 0;
  const s=[
    room.needs&&room.needs.length>0?1:0,
    room.constraints&&room.constraints.trim()?1:0,
    room.zones&&room.zones.trim()?1:0,
    room.variants&&room.variants.length>0?1:0,
    room.furniture&&room.furniture.length>0?1:0,
    valRatio(room),
  ];
  return Math.round(s.reduce((a,b)=>a+b,0)/6*100);
}

function valRatio(room){
  if(!room.validation) return 0;
  return VAL_ITEMS.filter(v=>room.validation[v.id]).length/VAL_ITEMS.length;
}

function uid(){return crypto.randomUUID()}
function roomsOrdered(){return Object.values(state.rooms).sort((a,b)=>a.order-b.order)}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
const PRIO_LABELS={indispensable:'INDISPENSABLE',souhaite:'SOUHAITÉ',bonus:'BONUS'};
function prioCycle(p){const c=['indispensable','souhaite','bonus'];return c[(c.indexOf(p)+1)%3]}

function resizeImg(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img,M=1600;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>{URL.revokeObjectURL(url);res(b);},'image/jpeg',.85);
    };
    img.src=url;
  });
}

function bindRoom(room){

  document.getElementById('inp-area')?.addEventListener('change',e=>{
    const v=parseFloat(e.target.value);

   ['inp-zones','zones'],['inp-notes','notes']].forEach(([id,key])=>{

    el.addEventListener('input',()=>{state.rooms[rid][key]=el.value;save();renderSidebar();});
  });

    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});

    });
  });
}

// ============================================================
// CHARGEMENT DES IMAGES (async)
// ============================================================

// Cache des object-URLs (clé = blobRef) pour rerendre sans re-fetch ni clignotement
const imgUrlCache = {};

async function loadImgs(room){
  const grid=document.getElementById('img-grid');if(!grid)return;
  const imgs=room.images||[];
  lbImgs=[];
  if(!imgs.length){grid.innerHTML='<p class="text-sm">Aucun visuel pour l\'instant.</p>';return;}

  // Lightbox : une entrée par image, dans l'ordre canonique d'ajout
  lbImgs=imgs.map(i=>({src:'',caption:i.caption,source:i.source||''}));
  const idxById={}; imgs.forEach((im,i)=>{idxById[im.id]=i;});

  // Regroupement par tag : une image apparaît sous CHACUN de ses tags ; les non taguées dans « Sans tag »
  const groups=new Map();   // tag -> [img]
  const untagged=[];
  imgs.forEach(img=>{
    const tags=(img.tags&&img.tags.length)?img.tags:null;
    if(tags) tags.forEach(t=>{ if(!groups.has(t)) groups.set(t,[]); groups.get(t).push(img); });
    else untagged.push(img);
  });
  const tagNames=[...groups.keys()].sort((a,b)=>a.localeCompare(b,'fr'));

  function cardHtml(img){
    return `<div class="img-card" data-iid="${img.id}" data-idx="${idxById[img.id]}">
      <img data-iid="${img.id}" src="" alt="${esc(img.caption)}">
      <button class="img-del" onclick="event.stopPropagation();delImg('${img.id}')">×</button>
      <div class="img-info">
        <input class="img-cap-edit" type="text" value="${esc(img.caption)}" placeholder="Légende…" data-iid="${img.id}">
        <div class="img-tags-edit" data-iid="${img.id}">${tagsHtml(img)}</div>
      </div>
    </div>`;
  }
  function groupHtml(label,labelHtml,list){
    return `<div class="img-group">
      <h4 class="img-group-hdr">${labelHtml} <span class="text-sm">${list.length}</span></h4>
      <div class="img-grid-inner">${list.map(cardHtml).join('')}</div>
    </div>`;
  }

  let html='';
  tagNames.forEach(t=>{ html+=groupHtml(t,`<span class="tag-chip tag-chip-hdr">${esc(t)}</span>`,groups.get(t)); });
  if(untagged.length) html+=groupHtml('','<span class="text-sm" style="font-weight:600">Sans tag</span>',untagged);
  grid.innerHTML=html;

  // Événements
  grid.querySelectorAll('.img-card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('button')||e.target.tagName==='INPUT'||e.target.closest('.img-tags-edit')) return;
      openLb(parseInt(card.dataset.idx));
    });
  });
  grid.querySelectorAll('.img-cap-edit').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const img=room.images.find(i=>i.id===inp.dataset.iid);
      if(img){img.caption=inp.value;save();const k=idxById[img.id];if(lbImgs[k])lbImgs[k].caption=inp.value;}
    });
  });
  grid.querySelectorAll('.img-tags-edit').forEach(wireTagContainer);

  // Chargement des blobs (cache d'abord, sinon IndexedDB) ; src appliqué à TOUTES les copies de l'image
  for(let i=0;i<imgs.length;i++){
    const img=imgs[i];
    let src='';
    if(img.blobRef){
      if(imgUrlCache[img.blobRef]) src=imgUrlCache[img.blobRef];
      else{
        const blob=await dbGet('images',img.blobRef).catch(()=>null);
        if(blob){src=URL.createObjectURL(blob);imgUrlCache[img.blobRef]=src;}
        else if(img.source) src=img.source;
      }
    } else if(img.source){ src=img.source; }
    if(src){
      lbImgs[i].src=src;
      grid.querySelectorAll(`img[data-iid="${img.id}"]`).forEach(el=>{el.src=src;});
    }
  }
}

// ============================================================
// AJOUT D'IMAGES
// ============================================================

async function handleFiles(files){
  for(const f of Array.from(files)){
    if(!f.type.startsWith('image/')) continue;
    const blob=await resizeImg(f);
    await storeImg(blob,f.name.replace(/\.[^.]+$/,''),'');
  }
}

async function storeImg(blob,caption,source){
  const room=state.rooms[curRoom];if(!room)return;
  const blobRef=uid();
  try{await dbSet('images',blobRef,blob);}
  catch{alert('Impossible de sauvegarder l\'image (quota IndexedDB dépassé ?)');return;}
  room.images.push({id:uid(),caption,source,tags:[],addedAt:new Date().toISOString(),blobRef});
  save();loadImgs(room);
  // Mettre à jour le compteur dans l'accordéon
  const accH=document.querySelector('#acc-img .acc-hdr h3');
  if(accH) accH.textContent=`Visuels d'inspiration (${room.images.length})`;
}

async function addImgUrl(){
  const inp=document.getElementById('url-inp');
  const url=(inp.value||'').trim();if(!url)return;inp.value='';
  try{
    const resp=await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const ct=resp.headers.get('content-type')||'image/jpeg';
    const buf=await resp.arrayBuffer();
    const blob=await resizeImg(new File([new Blob([buf],{type:ct})],'img',{type:ct}));
    await storeImg(blob,url.split('/').pop()||'Image',url);
  }catch{
    // Fallback : référence distante si CORS bloque
    const room=state.rooms[curRoom];if(!room)return;
    room.images.push({id:uid(),caption:url.split('/').pop()||'Image',source:url,tags:[],addedAt:new Date().toISOString(),blobRef:null});
    save();loadImgs(room);
  }
}

async function delImg(iid){
  if(!confirm('Supprimer ce visuel ?')) return;
  const room=state.rooms[curRoom];
  const idx=room.images.findIndex(i=>i.id===iid);if(idx===-1)return;
  const{blobRef}=room.images[idx];
  room.images.splice(idx,1);
  if(blobRef){
    await dbDel('images',blobRef);
    if(imgUrlCache[blobRef]){URL.revokeObjectURL(imgUrlCache[blobRef]);delete imgUrlCache[blobRef];}
  }
  save();loadImgs(room);
}

// ── Tags des visuels ──────────────────────────────────────────
function tagsHtml(img){
  const tags=img.tags||[];
  return tags.map(t=>`<span class="tag-chip">${esc(t)}<button class="tag-x" title="Retirer" data-iid="${img.id}" data-tag="${esc(t)}">×</button></span>`).join('')
    +`<input class="tag-add" type="text" placeholder="+ tag" data-iid="${img.id}">`;
}

function wireTagContainer(cont){
  const add=cont.querySelector('.tag-add');
  if(add){
    add.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===','){e.preventDefault();addImgTags(add.dataset.iid,add.value);add.value='';}
    });
    add.addEventListener('blur',()=>{if(add.value.trim()){addImgTags(add.dataset.iid,add.value);add.value='';}});
  }
  cont.querySelectorAll('.tag-x').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();removeImgTag(btn.dataset.iid,btn.dataset.tag);});
  });
}

function addImgTags(iid,raw){
  const img=state.rooms[curRoom].images.find(i=>i.id===iid);if(!img)return;
  if(!img.tags) img.tags=[];
  let added=false;
  raw.split(',').map(s=>s.trim()).filter(Boolean).forEach(t=>{
    if(!img.tags.includes(t)){img.tags.push(t);added=true;}
  });
  if(added){save();regroup(iid);}
}

function removeImgTag(iid,tag){
  const img=state.rooms[curRoom].images.find(i=>i.id===iid);if(!img||!img.tags)return;
  img.tags=img.tags.filter(t=>t!==tag);
  save();regroup(iid);
}

// Reconstruit la vue (regroupement par tag) après un changement de tags ; les blobs sont en cache,
// donc pas de clignotement. Le focus retourne sur le champ « + tag » de l'image éditée.
async function regroup(iid){
  await loadImgs(state.rooms[curRoom]);
  document.querySelector(`.img-tags-edit[data-iid="${iid}"] .tag-add`)?.focus();
}

document.addEventListener('input',e=>{
  if(!curRoom) return;
  const room=state.rooms[curRoom];
  if(e.target.classList.contains('ni-lbl')){
    const nid=e.target.closest('.need-item')?.dataset.nid;
    const n=room.needs.find(n=>n.id===nid);if(n){n.label=e.target.value;save();}
  }
  if(e.target.classList.contains('v-name')){
    const vid=e.target.closest('.var-card')?.dataset.vid;
    const v=room.variants.find(v=>v.id===vid);if(v){v.name=e.target.value;save();}
  }
  if(e.target.classList.contains('v-desc')){
    const vid=e.target.closest('.var-card')?.dataset.vid;
    const v=room.variants.find(v=>v.id===vid);if(v){v.desc=e.target.value;save();}
  }
  if(e.target.classList.contains('v-pros')){
    const vid=e.target.closest('.var-card')?.dataset.vid;
    const v=room.variants.find(v=>v.id===vid);if(v){v.pros=e.target.value;save();}
  }
  if(e.target.classList.contains('v-cons')){
    const vid=e.target.closest('.var-card')?.dataset.vid;
    const v=room.variants.find(v=>v.id===vid);if(v){v.cons=e.target.value;save();}
  }
  if(e.target.classList.contains('f-lbl')||e.target.classList.contains('f-dims')||e.target.classList.contains('f-notes')){
    const fid=e.target.closest('.furn-item')?.dataset.fid;
    const f=room.furniture.find(f=>f.id===fid);if(!f)return;
    if(e.target.classList.contains('f-lbl')) f.label=e.target.value;
    if(e.target.classList.contains('f-dims')) f.dims=e.target.value;
    if(e.target.classList.contains('f-notes')) f.notes=e.target.value;
    save();
  }
});

function renderMemo(){
  document.getElementById('memo-content').innerHTML=MEMO_DATA.map(sec=>{
    if(sec.note){
      return `<div class="memo-sec"><h4>${esc(sec.title)}</h4><p class="memo-note">${esc(sec.note)}</p></div>`;
    }
    const[hdr,...rows]=sec.cols?[sec.cols,...sec.rows]:[sec.rows[0],...sec.rows.slice(1)];
    // cols = header array, rows = data arrays
    const colArr=sec.cols;
    return `<div class="memo-sec"><h4>${esc(sec.title)}</h4>
      <table class="memo-tbl">
        <thead><tr>${colArr.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
        <tbody>${sec.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
  }).join('');
}

// ============================================================
// EXPORT MARKDOWN
// ============================================================

function roomMd(room){
  const p=calcPct(room);
  const area=room.area!=null?`${room.area} m²`:'surface non définie';
  const qs=SEED_QUESTIONS[room.id]||[];
  let md=`## ${room.name} (${area}) — avancement ${p} %\n\n`;
  if(room.usages?.trim()||room.needs?.length||room.ambiance?.trim()){
    md+=`### Usages & besoins\n`;
    if(room.usages?.trim()) md+=room.usages.trim()+'\n';
    if(room.needs?.length){
      md+='Besoins :\n';
      room.needs.forEach(n=>{md+=`- [${PRIO_LABELS[n.priority]}] ${n.label}\n`;});
    }
    if(room.ambiance?.trim()) md+=`Ambiance : ${room.ambiance.trim()}\n`;
    md+='\n';
  }
  if(room.constraints?.trim()) md+=`### Contraintes\n${room.constraints.trim()}\n\n`;
  if(room.zones?.trim()) md+=`### Zones & circulation\n${room.zones.trim()}\n\n`;
  if(room.variants?.length){
    md+=`### Implantation — variantes\n`;
    room.variants.forEach(v=>{
      md+=`- **${v.name}**${v.chosen?' (retenue)':''} — ${v.desc}`;
      if(v.pros) md+=` · + ${v.pros}`;
      if(v.cons) md+=` · − ${v.cons}`;
      md+='\n';
    });
    md+='\n';
  }
  if(room.furniture?.length){
    md+=`### Mobilier sur mesure\n`;
    room.furniture.forEach(f=>{md+=`- ${f.label}${f.dims?` — dims ${f.dims}`:''}${f.notes?` — ${f.notes}`:''}\n`;});
    md+='\n';
  }
  const hasA=qs.some((_,i)=>room.answers?.['q'+i]?.trim());
  if(hasA){
    md+=`### Réponses aux questions\n`;
    qs.forEach((q,i)=>{const a=room.answers?.['q'+i];if(a?.trim()) md+=`- ${q} : ${a.trim()}\n`;});
    md+='\n';
  }
  const hasV=VAL_ITEMS.some(v=>room.validation?.[v.id]);
  if(hasV){
    md+=`### Validation\n`;
    VAL_ITEMS.forEach(v=>{md+=`- [${room.validation?.[v.id]?'x':' '}] ${v.label}\n`;});
    md+='\n';
  }
  if(room.notes?.trim()) md+=`### Notes / décisions\n${room.notes.trim()}\n\n`;
  if(room.images?.length){
    md+=`### Visuels d'inspiration\n`;
    room.images.forEach(img=>{md+=`- ${img.caption||'(sans légende)'}${img.source?` (${img.source})`:''}${img.tags?.length?` [tags: ${img.tags.join(', ')}]`:''}\n`;});
    md+='\n';
  }
  return md;
}

function exportMdRoom(){
  if(!curRoom||curView!=='room'){alert('Sélectionner une pièce pour exporter ses décisions.');return;}
  const room=state.rooms[curRoom];
  dl(`decisions-${room.id}.md`,roomMd(room));ddClose();
}

function exportMdAll(){
  let md=`# Décisions agencement — E703\n\nT5, 106,62 m² + terrasse 36,56 m². Saint-Ouen.\nExporté le ${new Date().toLocaleDateString('fr-FR')}.\n\n---\n\n`;
  roomsOrdered().forEach(r=>{md+=roomMd(r)+'---\n\n';});
  dl('decisions-E703.md',md);ddClose();
}

// ============================================================
// BACKUP JSON
// ============================================================

async function exportBackup(){
  ddClose();setSI('saving');
  const backup=JSON.parse(JSON.stringify(state));
  for(const rid in backup.rooms){
    for(const img of(backup.rooms[rid].images||[])){
      if(img.blobRef){
        const blob=await dbGet('images',img.blobRef).catch(()=>null);
        if(blob) img.dataUrl=await blobToDataUrl(blob);
      }
    }
  }
  dl(`agencement-E703-backup-${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(backup,null,2),'application/json');
  setSI('saved');
}

async function importBackup(file){
  if(!file)return;
  if(!confirm('Importer ce fichier ? L\'état actuel sera REMPLACÉ.')) return;
  let data;
  try{data=JSON.parse(await file.text());}catch{alert('Fichier JSON invalide.');return;}
  for(const rid in data.rooms){
    for(const img of(data.rooms[rid].images||[])){
      if(img.dataUrl){
        const blob=dataUrlToBlob(img.dataUrl);
        const key=img.blobRef||uid();img.blobRef=key;
        await dbSet('images',key,blob);delete img.dataUrl;
      }
    }
  }
  // Le cache d'object-URLs référence les anciens blobRefs : on le purge
  for(const k in imgUrlCache){URL.revokeObjectURL(imgUrlCache[k]);delete imgUrlCache[k];}
  state=data;await dbSet('data','state',state);
  showDash();setSI('saved');
}

function blobToDataUrl(blob){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob);})}
function dataUrlToBlob(du){const[h,d]=du.split(','),m=h.match(/:(.*?);/)[1],b=atob(d),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:m});}

document.getElementById('import-file').addEventListener('change',e=>{importBackup(e.target.files[0]);e.target.value='';});

// ============================================================
// TÉLÉCHARGEMENT
// ============================================================

function dl(name,content,type='text/plain;charset=utf-8'){
  const url=URL.createObjectURL(new Blob([content],{type}));
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

document.addEventListener('paste',async e=>{

  for(const item of Array.from(e.clipboardData?.items||[])){

      e.preventDefault();
      const blob=await resizeImg(item.getAsFile());
      await storeImg(blob,'Image collée','');
      return;
    }
  }
});

// INITIALISATION
// ============================================================

async function init(){
  const theme=localStorage.getItem('theme')||'light';
  document.documentElement.dataset.theme=theme;
  document.getElementById('btn-theme').textContent=theme==='dark'?'☀️':'🌙';

  await openDB();
  const saved=await dbGet('data','state');
  state=saved||mkSeedState();
  if(!saved) await dbSet('data','state',state);

  renderMemo();

  const last=localStorage.getItem('lastRoom');
  if(last&&state.rooms[last]) selRoom(last);
  else showDash();

  setSI('saved');
}

init().catch(err=>{
  console.error('Erreur init:',err);
  document.getElementById('mc').innerHTML=`<p style="color:red;padding:24px">Erreur d'initialisation : ${esc(err.message)}</p>`;
});
</script>
